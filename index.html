<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animal Map</title>
</head>
<body style="text-align:center; background:#eee;">

  <h2>Welcome to the Zoo! Click an animal to visit!</h2>

  <!-- YOUR IMAGE -->
  <img src="ZOO MAP.JPG" usemap="#animalmap" width="800">

  <map name="animalmap">

    <!-- Lion (top center) -->
    <area shape="circle" coords="400,120,90" href="lion 1.html">

    <!-- Seal (top right) -->
    <area shape="circle" coords="700,250,70" href="seal 1.html">

    <!-- Monkeys (center) -->
    <area shape="circle" coords="420,350,85" href="monkey 1.html">

    <!-- Hippo (bottom center-right) -->
    <area shape="circle" coords="500,600,80" href="hippo 1.html">

    <!-- Bear (bottom right) -->
    <area shape="circle" coords="720,720,100" href="bear 1.html">

    <!-- Giraffe (left) -->
    <area shape="circle" coords="120,300,70" href="giraffe 1.html">

    <!-- Penguin (left-middle) -->
    <area shape="circle" coords="250,350,50" href="penguin 1.html">

  </map>

</body>
</html>
